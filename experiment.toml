# Single source of truth for simulation / scaling parameters.
# Parsed by the Python `rustpy_bench.core.config` module, and later by the
# Rust crates via `serde` + the `toml` crate, so both languages run the
# exact same problem definitions.

[equation]
alpha = 1.172e-5   # thermal diffusivity [m^2/s]
lx = 1.0           # plate length [m]
ly = 1.0           # plate width [m]
cfl = 0.5          # CFL number used to derive dt from dx, dy (<=1.0, stable)

[initial_condition]
kind = "hot_square"  # "hot_square" | "gaussian" | "uniform"
hot_value = 100.0    # value inside the hot region
cold_value = 0.0     # value elsewhere, and held fixed at the boundary (Dirichlet)
fraction = 0.2       # size of the hot region as a fraction of lx/ly (centered)

[experiment]
repetitions = 30     # repeated runs per parameter combination, per docs/spec.sr.md
snapshot_every = 1   # default snapshot stride in iterations (0 = final state only)

[scaling.strong]
# Fixed problem size; core count varied. Speedup measured vs. the serial baseline.
nx = 512
ny = 512
t = 50.0
cores = [1, 2, 4, 8, 16]

[scaling.weak]
# Per-core problem size held ~constant; total grid grows with core count.
# For n cores: nx = ny = round(nx0 * sqrt(n)) so that nx*ny scales ~linearly with n.
nx0 = 256
ny0 = 256
t = 50.0
cores = [1, 2, 4, 8, 16]
